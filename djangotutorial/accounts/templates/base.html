<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:400px;
            background:white;
            padding:2rem;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,.1);
        }

        h1{
            margin-bottom:20px;
            text-align:center;
        }

        form p{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#2563eb;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        .link{
            text-align:center;
            margin-top:15px;
        }

        a{
            text-decoration:none;
            color:#2563eb;
        }

        .errorlist{
            color:red;
            list-style:none;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<div class="card">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
